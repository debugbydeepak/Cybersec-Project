
name: SecureWay CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest bandit safety

    - name: Security Scan (Bandit)
      run: |
        bandit -r backend/app -f json -o bandit_report.json || true
        # Fail if high severity issues
        # grep -q "SEVERITY.HIGH" bandit_report.json && exit 1

    - name: Dependency Safety Check
      run: |
        safety check --full-report

    - name: Run Secret Detection
      run: |
        detect-secrets-hook --baseline .secrets.baseline || true

    - name: Run Unit Tests
      working-directory: ./backend
      run: |
        pytest || true

    - name: Run Custom AI Logic Analyzer
      working-directory: ./backend
      run: |
        python pipeline_runner.py

    - name: Auto-Fix Suggestions
      if: failure()
      run: |
        echo "::error:: Automated fixes available via MCP. Run local pipeline to apply."
